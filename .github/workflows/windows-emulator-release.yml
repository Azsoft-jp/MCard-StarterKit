name: Windows emulator release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build Windows x64 package
    runs-on: windows-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: >
          dotnet restore
          apps/windows-ble-peripheral/MCardBlePeripheral/MCardBlePeripheral.csproj
          --runtime win-x64

      - name: Select package version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}"
          } else {
            $version = "manual-${{ github.run_number }}"
          }
          "value=$($version.Replace('/', '-'))" >> $env:GITHUB_OUTPUT

      - name: Publish and package emulator
        shell: pwsh
        run: |
          apps/windows-ble-peripheral/scripts/package-release.ps1 `
            -Version "${{ steps.version.outputs.value }}" `
            -OutputDirectory release `
            -NoRestore

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: mcardkit-windows-emulator
          path: release/*.zip
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download Windows package
        uses: actions/download-artifact@v8
        with:
          name: mcardkit-windows-emulator
          path: release-assets

      - name: Create release checksums
        run: |
          cd release-assets
          sha256sum *.zip > SHA256SUMS-windows

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          if ! gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release create "${GITHUB_REF_NAME}" \
              --title "MCardKit ${GITHUB_REF_NAME}" \
              --notes "Public-safe, unofficial MCard-StarterKit emulator builds generated from this tag." \
              || gh release view "${GITHUB_REF_NAME}" >/dev/null
          fi
          gh release upload "${GITHUB_REF_NAME}" \
            release-assets/*.zip \
            release-assets/SHA256SUMS-windows \
            --clobber
